<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance LIFF</title>
</head>

<body>
  <h2>勤怠システム</h2>
  <p id="status">初期化中...</p>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
    window.addEventListener("load", async () => {

      try {
        // LIFF初期化
        await liff.init({ liffId: "2009771645-vBqLJXFu" });

        // 未ログインならログイン
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        // プロフィール取得
        const profile = await liff.getProfile();
        const idToken = liff.getIDToken();

        document.getElementById("status").innerText =
          profile.displayName + " 送信中...";

        // GASへGET送信（CORS回避）
        const url =
          "https://script.google.com/macros/s/AKfycbyi4sjjtGyTUO7pVBdSq8bT026plKXNa53t1T2SzuWW9CzFSUw8ggZ7SlP3c0Fr9A/exec"
          + "?idToken=" + encodeURIComponent(idToken);

        const res = await fetch(url);
        const text = await res.text();

        // 成功
        if (text === "登録成功") {
          alert("打刻しました");
          liff.closeWindow();
          return;
        }

        // 失敗
        alert("打刻に失敗しました");
        document.getElementById("status").innerText =
          profile.displayName + " / error";

      } catch (err) {
        console.error("ERROR:", err);
        document.getElementById("status").innerText = "エラー発生";
        alert(err?.message || "エラーが発生しました");
      }

    });
  </script>
</body>
</html>
