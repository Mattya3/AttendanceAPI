<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance LIFF</title>
</head>

<body>
  <h2>勤怠システム</h2>
  <pre id="status">初期化中...</pre>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
    const status = document.getElementById("status");

    function log(msg) {
      status.innerText += "\n" + msg;
    }

    window.addEventListener("load", async () => {

      try {
        await liff.init({ liffId: "2009771645-vBqLJXFu" });
        if (!liff.isLoggedIn()) {
          log("LIFF: 未ログイン → login()");
          liff.login();
          return;
        }

        const idToken = liff.getIDToken();

        const profile = await liff.getProfile();
        const userId = profile.userId;
        
        const url =
          "https://script.google.com/macros/s/AKfycbyi4sjjtGyTUO7pVBdSq8bT026plKXNa53t1T2SzuWW9CzFSUw8ggZ7SlP3c0Fr9A/exec"
          + "?userId=" + encodeURIComponent(userId);

        let res;
        
        try {
          res = await fetch(url);
        } catch (networkErr) {
          log("ネットワークエラー");
          log(networkErr.toString());
          return;
        }

        const text = await res.text();

        if (text === "出勤登録" || text === "退勤登録") {
          alert("打刻しました");
          liff.closeWindow();
          return;
        }

        alert("失敗: " + text);

      } catch (err) {
        log("❌ FATAL ERROR");
        log(err?.stack || err.toString());
        alert("エラーが発生しました");
      }

    });
  </script>
</body>
</html>
