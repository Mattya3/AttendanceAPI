<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LIFF TEST</title>
</head>

<body>
  <h2>LIFF TEST</h2>
  <p id="status">初期化中...</p>

  <!-- ① LIFF SDK（必須・最優先） -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
    window.addEventListener("load", async () => {

      try {
        // ② LIFF初期化
        await liff.init({ liffId: "2009771645-vBqLJXFu" });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        // ③ ユーザー情報取得
        const context = liff.getContext();
        const userId = context?.userId || "no-context";

        const profile = await liff.getProfile();
        const idToken = liff.getIDToken();

        document.getElementById("status").innerHTML = `
          userId: ${userId}<br>
          name: ${profile.displayName}<br>
          送信中...
        `;

        // ④ GASへ送信
        const res = await fetch(
          "https://script.google.com/macros/s/AKfycbyi4sjjtGyTUO7pVBdSq8bT026plKXNa53t1T2SzuWW9CzFSUw8ggZ7SlP3c0Fr9A/exec",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ idToken })
          }
        );

        const text = await res.text();

        // ⑤ 成功処理
        if (text === "登録成功") {
          alert("打刻しました");
          liff.closeWindow();
          return;
        }

        // ⑥ 失敗処理
        alert("打刻に失敗しました");
        document.getElementById("status").innerHTML = `
          userId: ${userId}<br>
          name: ${profile.displayName}<br>
          status: failed
        `;

      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "エラー発生";
        alert("エラーが発生しました");
      }

    });
  </script>
</body>
</html>
