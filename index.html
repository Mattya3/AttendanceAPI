<script>
liff.init({ liffId: "2009771645-vBqLJXFu" }).then(async () => {

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const context = liff.getContext();
  const userId = context.userId;

  const profile = await liff.getProfile();
  const idToken = liff.getIDToken();

  document.getElementById("status").innerHTML = `
    userId: ${userId}<br>
    name: ${profile.displayName}<br>
    送信中...
  `;

  try {
    const res = await fetch("https://script.google.com/macros/s/AKfycbyi4sjjtGyTUO7pVBdSq8bT026plKXNa53t1T2SzuWW9CzFSUw8ggZ7SlP3c0Fr9A/exec", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ idToken })
    });

    const text = await res.text();

    document.getElementById("status").innerHTML = `
      userId: ${userId}<br>
      name: ${profile.displayName}<br>
      結果: ${text}
    `;

  } catch (err) {
    document.getElementById("status").innerHTML = `
      エラー発生
    `;
    console.error(err);
  }

});
</script>
