<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance LIFF</title>
</head>

<body>
  <h2>勤怠システム</h2>
  <pre id="status">初期化中...</pre>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
    const status = document.getElementById("status");

    function log(msg) {
      status.innerText += "\n" + msg;
    }

    window.addEventListener("load", async () => {

      try {
        log("STEP1: LIFF init 開始");

        await liff.init({ liffId: "2009771645-vBqLJXFu" });

        log("STEP2: LIFF init 成功");

        if (!liff.isLoggedIn()) {
          log("STEP3: 未ログイン → login() 実行");
          liff.login();
          return;
        }

        log("STEP3: ログイン済み");

        const profile = await liff.getProfile();
        const idToken = liff.getIDToken();

        log("STEP4: profile取得成功: " + profile.displayName);

        const url =
          "https://script.google.com/macros/s/AKfycbyi4sjjtGyTUO7pVBdSq8bT026plKXNa53t1T2SzuWW9CzFSUw8ggZ7SlP3c0Fr9A/exec"
          + "?idToken=" + encodeURIComponent(idToken);

        log("STEP5: GAS送信URL作成完了");

        let res;
        try {
          res = await fetch(url);
          log("STEP6: fetch成功（HTTP通信OK）");
        } catch (networkErr) {
          log("❌ STEP6失敗: ネットワークエラー");
          log(networkErr.toString());
          return;
        }

        const text = await res.text();
        log("STEP7: GASレスポンス: " + text);

        if (text === "出勤登録") {
          log("STEP8: 成功処理");
          alert("打刻しました");
          liff.closeWindow();
          return;
        }

        if (text === "退勤登録") {
          log("STEP8: 成功処理");
          alert("打刻しました");
          liff.closeWindow();
          return;
        }

        log("❌ STEP8: 失敗レスポンス");
        alert("打刻に失敗しました: " + text);

      } catch (err) {
        log("❌ FATAL ERROR");
        log(err?.stack || err.toString());
        alert(err?.message || "エラーが発生しました");
      }

    });
  </script>
</body>
</html>
