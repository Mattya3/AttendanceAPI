<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NFC Attendance</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1c2530;
      --muted: #697586;
      --ok: #0b7a43;
      --err: #af2d2d;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #eef4ff 0%, var(--bg) 45%, #f4fff8 100%);
      color: var(--text);
    }
    main {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(520px, 100%);
      background: var(--panel);
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(14, 26, 41, 0.08);
      padding: 20px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }
    #status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      background: #f3f6fa;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.94rem;
    }
    #setup {
      margin-top: 14px;
      display: none;
      gap: 8px;
      flex-direction: column;
    }
    #setup input {
      height: 40px;
      border: 1px solid #d4dde8;
      border-radius: 8px;
      padding: 0 10px;
      font-size: 14px;
      box-sizing: border-box;
      width: 100%;
    }
    #setup button {
      height: 40px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: #164e8a;
      font-weight: 600;
    }
    #status.ok {
      background: #eaf8f0;
      color: var(--ok);
    }
    #status.err {
      background: #fdeff0;
      color: var(--err);
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>入退出打刻</h1>
      <p>NFCから起動された場合にのみ打刻します。処理完了後は自動で閉じます。</p>
      <div id="status">初期化中...</div>
      <div id="setup">
        <input id="nameInput" type="text" maxlength="40" placeholder="表示名">
        <button id="saveNameBtn" type="button">表示名を保存</button>
      </div>
    </section>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
  <script>
    const DEFAULT_CONFIG = {
      liffId: "REPLACE_WITH_LIFF_ID",
      gasEndpoint: "REPLACE_WITH_GAS_WEBAPP_URL"
    };
    const CONFIG = Object.assign({}, DEFAULT_CONFIG, window.ATTEND_CONFIG || {});

    const statusEl = document.getElementById("status");
    const setupEl = document.getElementById("setup");
    const saveNameBtn = document.getElementById("saveNameBtn");
    const nameInput = document.getElementById("nameInput");

    function setStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = type || "";
    }

    function decodeMaybe(value) {
      let out = String(value || "");
      for (let i = 0; i < 6; i += 1) {
        try {
          const next = decodeURIComponent(out);
          if (next === out) break;
          out = next;
        } catch (_) {
          break;
        }
      }
      return out;
    }

    function normalizeQueryLike(input) {
      if (!input) return "";
      const s = String(input).replace(/^#/, "");
      const qIndex = s.indexOf("?");
      if (qIndex >= 0) return s.slice(qIndex);
      return s.startsWith("?") ? s : ("?" + s);
    }

    function pickParamFromAnyQuery(name, queryLike) {
      if (!queryLike) return "";
      const candidate = normalizeQueryLike(queryLike);
      const qs = new URLSearchParams(candidate);
      const v = (qs.get(name) || "").trim();
      if (v) return v;
      const state = qs.get("liff.state");
      if (!state) return "";
      const decoded = decodeMaybe(state);
      const stateQuery = normalizeQueryLike(decoded);
      const qs2 = new URLSearchParams(stateQuery);
      return (qs2.get(name) || "").trim();
    }

    function pickParamFromRawText(name, input) {
      const raw = String(input || "");
      if (!raw) return "";

      const keys = [name, encodeURIComponent(name)];
      for (let i = 0; i < keys.length; i += 1) {
        const key = keys[i];
        const pattern = new RegExp("(?:[?&#]|^)" + key.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "=([^&#]+)");
        const m = raw.match(pattern);
        if (m && m[1]) {
          return decodeMaybe(m[1]).trim();
        }
      }
      return "";
    }

    function getParamFromUrlOrState(name) {
      const fromSearch = pickParamFromAnyQuery(name, window.location.search);
      if (fromSearch) return fromSearch;

      const fromHash = pickParamFromAnyQuery(name, window.location.hash);
      if (fromHash) return fromHash;

      const href = decodeMaybe(window.location.href || "");
      const qMark = href.indexOf("?");
      if (qMark >= 0) {
        const tail = href.slice(qMark);
        const fromHref = pickParamFromAnyQuery(name, tail);
        if (fromHref) return fromHref;
      }

      const referrer = decodeMaybe(document.referrer || "");
      const fromReferrer = pickParamFromAnyQuery(name, referrer);
      if (fromReferrer) return fromReferrer;

      const rawCandidates = [window.location.search, window.location.hash, window.location.href, document.referrer];
      for (let i = 0; i < rawCandidates.length; i += 1) {
        const raw = decodeMaybe(rawCandidates[i] || "");
        const fromRaw = pickParamFromRawText(name, raw);
        if (fromRaw) return fromRaw;
      }
      return "";
    }

    function buildUrlDebugInfo() {
      const parts = [
        "search=" + String(window.location.search || ""),
        "hash=" + String(window.location.hash || ""),
        "href=" + String(window.location.href || ""),
        "referrer=" + String(document.referrer || "")
      ];
      return parts.join("\n");
    }

    function getCardKeyFromUrl() {
      return getParamFromUrlOrState("card");
    }

    function getModeFromUrl() {
      return getParamFromUrlOrState("mode");
    }

    async function postJson(payload) {
      const res = await fetch(CONFIG.gasEndpoint, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      return res.json();
    }

    async function createSession(cardKey) {
      const session = await postJson({ action: "session", cardKey });
      if (!session.ok) throw new Error(session.message || "session failed");
      return session;
    }

    async function registerName(cardKey, idToken, nonce, displayName, action) {
      const result = await postJson({
        action: action || "register_name",
        cardKey,
        idToken,
        nonce,
        displayName
      });

      if (!result.ok) {
        throw new Error(result.message || "名前登録に失敗しました");
      }
      return result.displayName;
    }

    async function run() {
      const cardKey = getCardKeyFromUrl();
      if (!cardKey) {
        setStatus(
          "NFC専用URLではありません。cardキーが不足しています。LIFFのエンドポイントURL設定・NFC登録URLを確認してください。\n\n" +
          "---- debug ----\n" + buildUrlDebugInfo(),
          "err"
        );
        return;
      }

      if (!CONFIG.liffId || CONFIG.liffId.startsWith("REPLACE_")) {
        setStatus(
          "LIFF設定が未完了です。githubIndex/config.js の liffId を設定してください。\n" +
          "current liffId=" + String(CONFIG.liffId || "(empty)"),
          "err"
        );
        return;
      }
      if (!CONFIG.gasEndpoint || CONFIG.gasEndpoint.startsWith("REPLACE_")) {
        setStatus(
          "GAS設定が未完了です。githubIndex/config.js の gasEndpoint を設定してください。\n" +
          "current gasEndpoint=" + String(CONFIG.gasEndpoint || "(empty)"),
          "err"
        );
        return;
      }

      const mode = getModeFromUrl();
      await liff.init({ liffId: CONFIG.liffId });
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const idToken = liff.getIDToken();
      if (!idToken) {
        throw new Error("LINE IDトークンを取得できませんでした");
      }

      if (mode === "setup") {
        await runSetup(cardKey, idToken);
        return;
      }

      const session1 = await createSession(cardKey);
      const punch = await postJson({
        action: "punch",
        cardKey,
        idToken,
        nonce: session1.nonce
      });

      if (!punch.ok && punch.code === "NAME_REQUIRED") {
        await runInitialRegistration(cardKey, idToken);
        return;
      }

      if (!punch.ok) {
        throw new Error(punch.message || "打刻失敗");
      }

      showDone(punch);
    }

    async function runSetup(cardKey, idToken) {
      const profile = await liff.getProfile();
      nameInput.value = profile.displayName || "";
      setupEl.style.display = "flex";
      setStatus("初期設定モードです。表示名を保存してください。");

      saveNameBtn.onclick = async () => {
        try {
          const displayName = nameInput.value.trim();
          if (!displayName) {
            throw new Error("表示名を入力してください");
          }
          setStatus("保存中...");
          const session = await createSession(cardKey);
          const saved = await registerName(cardKey, idToken, session.nonce, displayName, "set_name");
          setStatus("保存完了: " + saved, "ok");
          setTimeout(() => {
            if (liff.isInClient()) {
              liff.closeWindow();
            }
          }, 700);
        } catch (err) {
          setStatus(String(err.message || err), "err");
        }
      };
    }

    async function runInitialRegistration(cardKey, idToken) {
      const profile = await liff.getProfile();
      nameInput.value = profile.displayName || "";
      setupEl.style.display = "flex";
      saveNameBtn.textContent = "名前を登録して打刻";
      setStatus("初回利用です。表示名を入力して登録してください。");

      saveNameBtn.onclick = async () => {
        try {
          const displayName = nameInput.value.trim();
          if (!displayName) {
            throw new Error("表示名を入力してください");
          }
          setStatus("登録と打刻を実行中...");

          const sessionReg = await createSession(cardKey);
          await registerName(cardKey, idToken, sessionReg.nonce, displayName, "register_name");

          const sessionPunch = await createSession(cardKey);
          const retry = await postJson({
            action: "punch",
            cardKey,
            idToken,
            nonce: sessionPunch.nonce
          });
          if (!retry.ok) throw new Error(retry.message || "打刻失敗");
          showDone(retry);
        } catch (err) {
          setStatus(String(err.message || err), "err");
        }
      };
    }

    function showDone(result) {
      if (result.code === "CHECKIN") {
        setStatus("入室を記録しました: " + result.displayName, "ok");
      } else if (result.code === "CHECKOUT") {
        setStatus("退室を記録しました: " + result.displayName, "ok");
      } else {
        setStatus("処理完了: " + result.code, "ok");
      }
      setTimeout(() => {
        if (liff.isInClient()) {
          liff.closeWindow();
        }
      }, 600);
    }

    window.addEventListener("load", () => {
      run().catch((err) => {
        setStatus(String(err.message || err), "err");
      });
    });
  </script>
</body>
</html>
