<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NFC Attendance</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1c2530;
      --muted: #697586;
      --ok: #0b7a43;
      --err: #af2d2d;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #eef4ff 0%, var(--bg) 45%, #f4fff8 100%);
      color: var(--text);
    }
    main {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(520px, 100%);
      background: var(--panel);
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(14, 26, 41, 0.08);
      padding: 20px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }
    #status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      background: #f3f6fa;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.94rem;
    }
    #setup {
      margin-top: 14px;
      display: none;
      gap: 8px;
      flex-direction: column;
    }
    #setup input {
      height: 40px;
      border: 1px solid #d4dde8;
      border-radius: 8px;
      padding: 0 10px;
      font-size: 14px;
      box-sizing: border-box;
      width: 100%;
    }
    #setup button {
      height: 40px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: #164e8a;
      font-weight: 600;
    }
    #status.ok {
      background: #eaf8f0;
      color: var(--ok);
    }
    #status.err {
      background: #fdeff0;
      color: var(--err);
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>入退出打刻</h1>
      <p>NFCから起動された場合にのみ打刻します。処理完了後は自動で閉じます。</p>
      <div id="status">初期化中...</div>
      <div id="setup">
        <input id="nameInput" type="text" maxlength="40" placeholder="表示名">
        <button id="saveNameBtn" type="button">表示名を保存</button>
      </div>
    </section>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
  <script>
    const DEFAULT_CONFIG = {
      liffId: "REPLACE_WITH_LIFF_ID",
      gasEndpoint: "REPLACE_WITH_GAS_WEBAPP_URL"
    };
    const CONFIG = Object.assign({}, DEFAULT_CONFIG, window.ATTEND_CONFIG || {});

    const statusEl = document.getElementById("status");
    const setupEl = document.getElementById("setup");
    const saveNameBtn = document.getElementById("saveNameBtn");
    const nameInput = document.getElementById("nameInput");

    function setStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = type || "";
    }

    function decodeOnce(value) {
      try {
        return decodeURIComponent(String(value || ""));
      } catch (_) {
        return String(value || "");
      }
    }

    function normalizeQueryLike(input) {
      if (!input) return "";
      const s = String(input).replace(/^#/, "");
      const qIndex = s.indexOf("?");
      if (qIndex >= 0) return s.slice(qIndex);
      return s.startsWith("?") ? s : ("?" + s);
    }

    function getParamFromQuery(name, queryLike) {
      if (!queryLike) return "";
      const query = normalizeQueryLike(queryLike);
      const qs = new URLSearchParams(query);
      const direct = (qs.get(name) || "").trim();
      if (direct) return direct;

      const state = (qs.get("liff.state") || "").trim();
      if (!state) return "";
      const stateQuery = normalizeQueryLike(decodeOnce(state));
      return (new URLSearchParams(stateQuery).get(name) || "").trim();
    }

    function getParamFromUrlOrState(name) {
      const searchHit = getParamFromQuery(name, window.location.search);
      if (searchHit) return searchHit;

      return getParamFromQuery(name, window.location.hash);
    }

    function getCardKeyFromUrl() {
      return getParamFromUrlOrState("card");
    }

    function getModeFromUrl() {
      return getParamFromUrlOrState("mode");
    }

    async function postJson(payload) {
      const res = await fetch(CONFIG.gasEndpoint, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      return res.json();
    }

    async function createSession(cardKey, location) {
      const session = await postJson({
        action: "session",
        cardKey,
        clientLocation: location
      });
      if (!session.ok) throw new Error(session.message || "session failed");
      return session;
    }

    async function registerName(cardKey, idToken, nonce, displayName, action, location) {
      const result = await postJson({
        action: action || "register_name",
        cardKey,
        idToken,
        nonce,
        displayName,
        clientLocation: location
      });

      if (!result.ok) {
        throw new Error(result.message || "名前登録に失敗しました");
      }
      return result.displayName;
    }

    function getClientLocation() {
      if (!("geolocation" in navigator)) {
        return Promise.resolve(null);
      }
      return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            resolve({
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
              accuracy: pos.coords.accuracy,
              at: new Date().toISOString()
            });
          },
          () => resolve(null),
          {
            enableHighAccuracy: true,
            timeout: 5000,
            maximumAge: 15000
          }
        );
      });
    }

    async function run() {
      const cardKey = getCardKeyFromUrl();
      if (!cardKey) {
        setStatus(
          "このURLでは打刻できません。管理者に連絡してください。",
          "err"
        );
        return;
      }

      if (!CONFIG.liffId || CONFIG.liffId.startsWith("REPLACE_")) {
        setStatus(
          "サービス設定エラーです。管理者に連絡してください。",
          "err"
        );
        return;
      }
      if (!CONFIG.gasEndpoint || CONFIG.gasEndpoint.startsWith("REPLACE_")) {
        setStatus(
          "サービス設定エラーです。管理者に連絡してください。",
          "err"
        );
        return;
      }

      const mode = getModeFromUrl();
      await liff.init({ liffId: CONFIG.liffId });
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      if (!liff.isInClient()) {
        setStatus("LINEアプリ内からアクセスしてください。", "err");
        return;
      }

      const idToken = liff.getIDToken();
      if (!idToken) {
        throw new Error("LINE IDトークンを取得できませんでした");
      }

      if (mode === "setup") {
        await runSetup(cardKey, idToken);
        return;
      }

      const location = await getClientLocation();
      const session1 = await createSession(cardKey, location);
      const punch = await postJson({
        action: "punch",
        cardKey,
        idToken,
        nonce: session1.nonce,
        clientLocation: location
      });

      if (!punch.ok && punch.code === "NAME_REQUIRED") {
        await runInitialRegistration(cardKey, idToken);
        return;
      }

      if (!punch.ok) {
        throw new Error(punch.message || "打刻失敗");
      }

      showDone(punch);
    }

    async function runSetup(cardKey, idToken) {
      const profile = await liff.getProfile();
      nameInput.value = profile.displayName || "";
      setupEl.style.display = "flex";
      setStatus("初期設定モードです。表示名を保存してください。");

      saveNameBtn.onclick = async () => {
        try {
          const displayName = nameInput.value.trim();
          if (!displayName) {
            throw new Error("表示名を入力してください");
          }
          setStatus("保存中...");
          const location = await getClientLocation();
          const session = await createSession(cardKey, location);
          const saved = await registerName(cardKey, idToken, session.nonce, displayName, "set_name", location);
          setStatus("保存完了: " + saved, "ok");
          setTimeout(() => {
            if (liff.isInClient()) {
              liff.closeWindow();
            }
          }, 700);
        } catch (err) {
          setStatus(String(err.message || err), "err");
        }
      };
    }

    async function runInitialRegistration(cardKey, idToken) {
      const profile = await liff.getProfile();
      nameInput.value = profile.displayName || "";
      setupEl.style.display = "flex";
      saveNameBtn.textContent = "名前を登録して打刻";
      setStatus("初回利用です。表示名を入力して登録してください。");

      saveNameBtn.onclick = async () => {
        try {
          const displayName = nameInput.value.trim();
          if (!displayName) {
            throw new Error("表示名を入力してください");
          }
          setStatus("登録と打刻を実行中...");

          const location = await getClientLocation();
          const sessionReg = await createSession(cardKey, location);
          await registerName(cardKey, idToken, sessionReg.nonce, displayName, "register_name", location);

          const sessionPunch = await createSession(cardKey, location);
          const retry = await postJson({
            action: "punch",
            cardKey,
            idToken,
            nonce: sessionPunch.nonce,
            clientLocation: location
          });
          if (!retry.ok) throw new Error(retry.message || "打刻失敗");
          showDone(retry);
        } catch (err) {
          setStatus(String(err.message || err), "err");
        }
      };
    }

    function showDone(result) {
      if (result.code === "CHECKIN") {
        setStatus("入室を記録しました: " + result.displayName, "ok");
      } else if (result.code === "CHECKOUT") {
        setStatus("退室を記録しました: " + result.displayName, "ok");
      } else {
        setStatus("処理完了: " + result.code, "ok");
      }
      setTimeout(() => {
        if (liff.isInClient()) {
          liff.closeWindow();
        }
      }, 600);
    }

    window.addEventListener("load", () => {
      run().catch((err) => {
        setStatus(String(err.message || err), "err");
      });
    });
  </script>
</body>
</html>
