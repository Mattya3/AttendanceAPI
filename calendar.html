<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>週表示カレンダー</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      box-sizing: border-box;
    }
    .wrap {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
      padding: 10px;
      box-sizing: border-box;
    }
    .toolbar {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      box-sizing: border-box;
    }
    .toolbar button {
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 8px;
      height: 34px;
      padding: 0 10px;
      font-size: 14px;
      cursor: pointer;
    }
    .toolbar a {
      color: #0b57d0;
      font-size: 14px;
      margin-left: auto;
    }
    #status {
      font-size: 14px;
      color: #4b5563;
    }
    #frame {
      width: 100%;
      height: calc(100dvh - 78px);
      border: 0;
      border-radius: 10px;
      background: #fff;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="toolbar">
      <button id="prev" type="button">前週</button>
      <button id="today" type="button">今週</button>
      <button id="next" type="button">次週</button>
      <button id="todayOnly" type="button">今日だけ</button>
      <span id="status">読み込み中...</span>
      <a id="manual" href="#" target="_blank" rel="noreferrer">別タブで開く</a>
    </section>
    <iframe id="frame" title="calendar"></iframe>
  </main>
  <script src="./config.js"></script>
  <script>
    (function () {
      const statusEl = document.getElementById("status");
      const manualEl = document.getElementById("manual");
      const frameEl = document.getElementById("frame");
      const prevBtn = document.getElementById("prev");
      const todayBtn = document.getElementById("today");
      const nextBtn = document.getElementById("next");
      const todayOnlyBtn = document.getElementById("todayOnly");
      const cfg = window.ATTEND_CONFIG || {};

      function ymdJstWithOffset(offsetDays) {
        const now = new Date();
        const ms = now.getTime() + 9 * 60 * 60 * 1000;
        const jst = new Date(ms + offsetDays * 24 * 60 * 60 * 1000);
        const y = jst.getUTCFullYear();
        const m = String(jst.getUTCMonth() + 1).padStart(2, "0");
        const d = String(jst.getUTCDate()).padStart(2, "0");
        return "" + y + m + d;
      }

      const calendarId = String(cfg.calendarId || "").trim();
      const tz = encodeURIComponent(String(cfg.calendarTimeZone || "Asia/Tokyo"));
      const viewMode = "WEEK";

      if (!calendarId) {
        statusEl.textContent = "calendarId が未設定です。config.js を設定してください。";
        manualEl.style.display = "none";
        return;
      }

      const src = encodeURIComponent(calendarId);
      let weekOffset = 0;
      let dayOnly = false;

      function buildTarget(offset) {
        const day = ymdJstWithOffset(offset * 7);
        // `DAY` is unstable in Google Calendar embed and can fall back to MONTH.
        // Use AGENDA + same-day date range for a reliable "today only" view.
        const mode = dayOnly ? "AGENDA" : viewMode;
        return (
          "https://calendar.google.com/calendar/embed" +
          "?src=" + src +
          "&ctz=" + tz +
          "&mode=" + encodeURIComponent(mode) +
          "&dates=" + day + "/" + day +
          "&showTitle=0&showNav=0&showTabs=0&showCalendars=0&showTz=0"
        );
      }

      function render() {
        const target = buildTarget(weekOffset);
        frameEl.src = target;
        manualEl.href = target;
        if (weekOffset === 0) {
          statusEl.textContent = dayOnly ? "今日だけを表示中" : "今週を表示中";
          return;
        }
        statusEl.textContent =
          dayOnly
            ? "今日だけを表示中"
            : (weekOffset > 0 ? "+" : "") + String(weekOffset) + "週";
      }

      prevBtn.addEventListener("click", function () {
        dayOnly = false;
        weekOffset -= 1;
        render();
      });
      nextBtn.addEventListener("click", function () {
        dayOnly = false;
        weekOffset += 1;
        render();
      });
      todayBtn.addEventListener("click", function () {
        dayOnly = false;
        weekOffset = 0;
        render();
      });
      todayOnlyBtn.addEventListener("click", function () {
        dayOnly = true;
        weekOffset = 0;
        render();
      });

      render();
    })();
  </script>
</body>
</html>
